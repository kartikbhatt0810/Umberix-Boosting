<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umberix Boosting — Minecraft PvP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #08060f;
  --bg2:     #0e0b1a;
  --bg3:     #130f22;
  --purple:  #a855f7;
  --purple2: #7c3aed;
  --purple3: #c084fc;
  --pink:    #e040fb;
  --white:   #f0eeff;
  --muted:   #6b5e8a;
  --border:  rgba(168,85,247,0.15);
  --glow:    0 0 40px rgba(168,85,247,0.2);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  overflow-x: hidden;
  cursor: default;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.022; pointer-events: none; z-index: 9990;
}

#scrollBar {
  position: fixed; top: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--purple2), var(--pink));
  z-index: 9999; box-shadow: 0 0 10px rgba(168,85,247,0.7); width: 0%;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  padding: 18px 6vw;
  display: flex; align-items: center; justify-content: space-between;
  transition: background .4s, border-color .4s;
  border-bottom: 1px solid transparent;
}
nav.scrolled {
  background: rgba(8,6,15,0.9);
  backdrop-filter: blur(24px);
  border-color: var(--border);
}
.nav-logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem;
  color: var(--white); text-decoration: none;
}
.nav-logo span { color: var(--purple3); }
.nav-links { display: flex; gap: 30px; list-style: none; }
.nav-links a {
  font-size: .78rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); text-decoration: none; transition: color .2s;
}
.nav-links a:hover { color: var(--white); }
.nav-cta {
  background: linear-gradient(135deg, var(--purple2), var(--pink));
  color: #fff; font-weight: 700; font-size: .82rem; letter-spacing: .08em;
  text-transform: uppercase; padding: 10px 22px; border-radius: 6px;
  text-decoration: none; transition: opacity .2s, transform .15s;
}
.nav-cta:hover { opacity: .85; transform: translateY(-1px); }

/* HERO */
.hero {
  min-height: 100vh; display: flex; align-items: center;
  padding: 0 6vw; position: relative; overflow: hidden;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(168,85,247,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,85,247,0.05) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 100%);
}
.hero-orb {
  position: absolute; width: 640px; height: 640px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.22) 0%, rgba(168,85,247,0.07) 40%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  animation: orbPulse 6s ease-in-out infinite; pointer-events: none;
}
@keyframes orbPulse {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .7; }
  50% { transform: translate(-50%,-50%) scale(1.12); opacity: 1; }
}

.hero-content { position: relative; z-index: 2; max-width: 660px; }

.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.28);
  border-radius: 100px; padding: 6px 16px;
  font-size: .72rem; font-weight: 700; letter-spacing: .15em;
  text-transform: uppercase; color: var(--purple3); margin-bottom: 28px;
  opacity: 0; transform: translateY(12px); animation: fadeUp .6s .1s forwards;
}
.hero-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--purple3); animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

h1 {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(3rem, 7.5vw, 7rem); line-height: .93;
  letter-spacing: -.02em; margin-bottom: 24px;
  opacity: 0; transform: translateY(24px); animation: fadeUp .7s .25s forwards;
}
h1 .gradient {
  background: linear-gradient(135deg, var(--purple3) 0%, var(--pink) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
h1 .ghost {
  -webkit-text-stroke: 1.5px rgba(168,85,247,0.28); -webkit-text-fill-color: transparent;
}

.hero-sub {
  font-size: 1rem; color: #6a5a90; line-height: 1.75; max-width: 480px; margin-bottom: 16px;
  opacity: 0; transform: translateY(18px); animation: fadeUp .6s .4s forwards;
}
.hero-note {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(168,85,247,0.07); border: 1px solid rgba(168,85,247,0.2);
  border-radius: 8px; padding: 8px 14px;
  font-size: .8rem; font-weight: 500; color: var(--purple3); margin-bottom: 36px;
  opacity: 0; transform: translateY(16px); animation: fadeUp .6s .5s forwards;
}
.hero-btns {
  display: flex; gap: 14px; flex-wrap: wrap;
  opacity: 0; transform: translateY(16px); animation: fadeUp .6s .62s forwards;
}

.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, var(--purple2) 0%, var(--pink) 100%);
  color: #fff; font-weight: 700; font-size: .9rem; letter-spacing: .06em;
  text-transform: uppercase; padding: 14px 30px; border-radius: 8px;
  text-decoration: none; box-shadow: 0 4px 24px rgba(124,58,237,0.35);
  position: relative; overflow: hidden; transition: transform .25s, box-shadow .25s;
}
.btn-primary::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%); transition: transform .5s;
}
.btn-primary:hover::before { transform: translateX(100%); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(168,85,247,0.5); }

.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid rgba(168,85,247,0.3); color: var(--purple3);
  font-weight: 600; font-size: .9rem; letter-spacing: .06em; text-transform: uppercase;
  padding: 14px 30px; border-radius: 8px; text-decoration: none;
  background: rgba(168,85,247,0.06); transition: all .2s;
}
.btn-ghost:hover { border-color: var(--purple); background: rgba(168,85,247,0.14); color: #fff; }

/* SWORD VISUAL */
.hero-visual {
  position: absolute; right: 8vw; top: 50%; transform: translateY(-50%);
  opacity: 0; animation: fadeIn 1.2s .9s forwards;
}
@keyframes fadeIn { to { opacity:1; } }

.sword-wrap {
  position: relative; width: 200px; height: 360px;
  display: flex; align-items: center; justify-content: center;
  animation: swordFloat 5s ease-in-out infinite;
}
@keyframes swordFloat {
  0%,100% { transform: translateY(0px) rotate(-3deg); }
  50% { transform: translateY(-20px) rotate(3deg); }
}
.sword-glow-ring {
  position: absolute; width: 150px; height: 150px; border-radius: 50%;
  background: radial-gradient(circle, rgba(168,85,247,0.35) 0%, transparent 70%);
  animation: orbPulse 3.5s ease-in-out infinite;
}
.sword-svg-el {
  position: relative; z-index: 2;
  filter: drop-shadow(0 0 18px rgba(168,85,247,0.75)) drop-shadow(0 0 50px rgba(124,58,237,0.3));
  image-rendering: pixelated;
}

/* STATS */
.stats-bar {
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  background: var(--bg2); padding: 32px 6vw;
  display: flex; justify-content: space-around; flex-wrap: wrap; gap: 28px; position: relative;
}
.stats-bar::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple), transparent); opacity: .5;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1; display: block;
  background: linear-gradient(135deg, var(--white) 0%, var(--purple3) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.stat-label {
  font-size: .72rem; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted); margin-top: 6px; display: block;
}

/* SECTION */
section { padding: 100px 6vw; }
.section-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: .7rem; font-weight: 700; letter-spacing: .22em;
  text-transform: uppercase; color: var(--purple3); margin-bottom: 16px;
}
.section-eyebrow::before { content: ''; width: 20px; height: 1px; background: var(--purple3); }
.section-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(2rem, 4.5vw, 3.6rem); line-height: .96; margin-bottom: 14px;
}
.section-title span {
  background: linear-gradient(135deg, var(--purple3) 0%, var(--pink) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.section-sub { font-size: .95rem; color: #60508a; line-height: 1.75; max-width: 500px; margin-bottom: 52px; }

/* GAMEMODES */
.gamemodes-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.mode-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 16px;
  padding: 40px 30px; position: relative; overflow: hidden;
  transition: border-color .3s, transform .35s, box-shadow .3s;
}
.mode-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, rgba(168,85,247,0.07) 0%, transparent 60%);
  opacity: 0; transition: opacity .3s;
}
.mode-card:hover { border-color: rgba(168,85,247,0.5); transform: translateY(-6px); box-shadow: var(--glow); }
.mode-card:hover::before { opacity: 1; }
.mode-card.featured {
  border-color: rgba(168,85,247,0.45);
  background: linear-gradient(135deg, rgba(124,58,237,0.1) 0%, var(--bg3) 60%);
}
.mode-badge {
  position: absolute; top: 18px; right: 18px;
  background: linear-gradient(135deg, var(--purple2), var(--pink));
  color: #fff; font-size: .6rem; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; padding: 4px 12px; border-radius: 100px;
}
.mode-icon { font-size: 2.6rem; margin-bottom: 18px; display: block; }
.mode-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.55rem; margin-bottom: 10px; }
.mode-desc { font-size: .86rem; color: #60508a; line-height: 1.65; margin-bottom: 24px; }
.mode-prices { display: flex; gap: 10px; flex-wrap: wrap; }
.mode-price-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2);
  border-radius: 6px; padding: 6px 12px;
  font-size: .77rem; font-weight: 600; color: var(--purple3);
}
.mode-price-tag strong { color: var(--white); }

/* TICKER */
.ticker-wrap {
  overflow: hidden; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  background: var(--bg2); padding: 14px 0;
}
.ticker { display: flex; animation: ticker 28s linear infinite; white-space: nowrap; }
.ticker-item {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 0 36px; font-size: .73rem; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted); border-right: 1px solid var(--border);
}
.ticker-item em { color: var(--purple3); font-style: normal; }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* PRICING */
#pricing { background: var(--bg2); }
.pricing-tabs { display: flex; gap: 8px; margin-bottom: 52px; flex-wrap: wrap; }
.ptab {
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: .82rem;
  letter-spacing: .1em; text-transform: uppercase; padding: 10px 24px; border-radius: 8px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .2s;
}
.ptab.active, .ptab:hover {
  background: linear-gradient(135deg, var(--purple2), var(--pink));
  color: #fff; border-color: transparent; box-shadow: 0 4px 18px rgba(168,85,247,0.3);
}
.pricing-panel { display: none; }
.pricing-panel.active { display: block; }

.pricing-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; max-width: 720px; }
.price-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: 18px;
  padding: 36px 30px; position: relative; overflow: hidden;
  transition: border-color .3s, transform .3s, box-shadow .3s;
}
.price-card:hover { border-color: rgba(168,85,247,0.45); transform: translateY(-5px); box-shadow: var(--glow); }
.price-card.featured {
  border-color: rgba(168,85,247,0.5);
  background: linear-gradient(145deg, rgba(124,58,237,0.1) 0%, var(--bg) 70%);
}
.price-card.featured::before {
  content: '⚡ BEST VALUE'; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, var(--purple2), var(--pink));
  color: #fff; font-size: .6rem; font-weight: 700; letter-spacing: .14em;
  padding: 5px 18px; border-radius: 0 0 10px 10px;
}
.tier-label { font-size: .7rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.tier-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.45rem; margin-bottom: 4px; }
.tier-range { font-size: .8rem; color: #4a3a6a; margin-bottom: 24px; }
.tier-price { display: flex; align-items: flex-end; gap: 4px; margin-bottom: 24px; }
.price-dollar { font-size: 1.1rem; color: var(--purple3); font-weight: 700; margin-bottom: 8px; }
.price-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 3.8rem; line-height: 1; }
.price-per { font-size: .78rem; color: var(--muted); margin-bottom: 6px; }
.tier-features { list-style: none; margin-bottom: 26px; }
.tier-features li {
  display: flex; align-items: center; gap: 10px;
  font-size: .86rem; color: #8070aa;
  padding: 8px 0; border-bottom: 1px solid rgba(168,85,247,0.07);
}
.check { color: var(--purple3); flex-shrink: 0; font-size: 1rem; }
.tier-btn {
  display: block; width: 100%; text-align: center;
  font-weight: 700; font-size: .88rem; letter-spacing: .08em; text-transform: uppercase;
  padding: 13px; border-radius: 8px; text-decoration: none;
  border: 1px solid rgba(168,85,247,0.35); color: var(--purple3);
  background: rgba(168,85,247,0.07); transition: all .2s;
}
.tier-btn:hover, .price-card.featured .tier-btn {
  background: linear-gradient(135deg, var(--purple2), var(--pink));
  border-color: transparent; color: #fff;
  box-shadow: 0 4px 20px rgba(168,85,247,0.4);
}

/* HOW IT WORKS */
.steps-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 32px; position: relative; }
.steps-row::before {
  content: ''; position: absolute; top: 44px; left: 16.5%; right: 16.5%;
  height: 1px; background: linear-gradient(90deg, var(--purple2), rgba(168,85,247,.18), var(--purple2)); z-index: 0;
}
.step { text-align: center; padding: 0 20px; position: relative; z-index: 1; }
.step-num {
  width: 88px; height: 88px; border-radius: 50%;
  border: 1px solid rgba(168,85,247,0.3); background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 26px;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--purple3);
  transition: background .3s, box-shadow .3s;
}
.step:hover .step-num { background: rgba(168,85,247,0.15); box-shadow: 0 0 28px rgba(168,85,247,0.25); }
.step-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 12px; }
.step-desc { font-size: .87rem; color: #60508a; line-height: 1.7; }

/* DISCLAIMER */
.disclaimer {
  background: rgba(168,85,247,0.07); border: 1px solid rgba(168,85,247,0.22);
  border-radius: 10px; padding: 16px 20px;
  font-size: .84rem; color: var(--purple3); line-height: 1.65;
  max-width: 720px; margin-bottom: 40px;
  display: flex; align-items: flex-start; gap: 12px;
}
.disclaimer-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }

/* PAYMENT */
#payment { background: var(--bg); }
.payment-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; max-width: 680px; }
.pay-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 14px;
  padding: 26px 24px; display: flex; align-items: center; gap: 18px;
  transition: border-color .3s, transform .25s, box-shadow .25s;
}
.pay-card:hover { border-color: rgba(168,85,247,0.45); transform: translateY(-4px); box-shadow: var(--glow); }
.pay-icon {
  width: 48px; height: 48px; border-radius: 10px;
  background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}
.pay-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.08rem; margin-bottom: 4px; }
.pay-sub { font-size: .8rem; color: var(--muted); }

/* FAQ */
#faq { background: var(--bg2); }
.faq-list { max-width: 740px; }
.faq-item { border-bottom: 1px solid var(--border); overflow: hidden; }
.faq-q {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 0; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem;
  cursor: pointer; user-select: none; transition: color .2s;
}
.faq-q:hover { color: var(--purple3); }
.faq-icon {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid rgba(168,85,247,0.3); background: rgba(168,85,247,0.07);
  display: flex; align-items: center; justify-content: center;
  color: var(--purple3); font-size: 1.1rem; flex-shrink: 0; transition: transform .3s, background .2s;
}
.faq-item.open .faq-icon { transform: rotate(45deg); background: rgba(168,85,247,0.2); }
.faq-a {
  font-size: .88rem; color: #60508a; line-height: 1.8;
  max-height: 0; overflow: hidden; transition: max-height .42s cubic-bezier(.4,0,.2,1), padding .3s;
}
.faq-item.open .faq-a { max-height: 220px; padding-bottom: 22px; }

/* FOOTER */
footer { background: var(--bg); border-top: 1px solid var(--border); padding: 64px 6vw 32px; }
.footer-top { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 48px; margin-bottom: 48px; }
.footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; color: var(--white); text-decoration: none; display: block; margin-bottom: 12px; }
.footer-logo span { color: var(--purple3); }
.footer-brand p { font-size: .85rem; color: #4a3a6a; max-width: 280px; line-height: 1.65; }
.discord-btn {
  display: inline-flex; align-items: center; gap: 10px;
  background: #5865F2; color: #fff; font-weight: 700; font-size: .86rem;
  letter-spacing: .07em; text-transform: uppercase; padding: 12px 22px;
  border-radius: 8px; text-decoration: none; margin-top: 18px;
  transition: background .2s, transform .15s; box-shadow: 0 4px 18px rgba(88,101,242,0.3);
}
.discord-btn:hover { background: #7289da; transform: translateY(-2px); }
.footer-links h4 { font-size: .7rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.footer-links ul { list-style: none; }
.footer-links li { margin-bottom: 10px; }
.footer-links a { font-size: .87rem; color: #4a3a6a; text-decoration: none; transition: color .2s; }
.footer-links a:hover { color: var(--white); }
.footer-bottom { border-top: 1px solid var(--border); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.footer-bottom p { font-size: .76rem; color: #3a2a5a; }
.footer-bottom a { font-size: .76rem; color: #3a2a5a; text-decoration: none;
